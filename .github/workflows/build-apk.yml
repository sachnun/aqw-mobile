name: Build APK

on:
  workflow_dispatch:
    inputs:
      version_prefix:
        description: 'Version prefix (e.g. 1.0, 1.1, 2.0)'
        required: false
        default: '1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          APP_VERSION="${{ github.event.inputs.version_prefix }}.${{ github.run_number }}"
          TAG_VERSION="v${APP_VERSION}"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG_VERSION=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Dlang
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Dependencies and Build RABCDAsm
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip git curl liblzma-dev

          git clone --depth 1 https://github.com/CyberShadow/RABCDAsm.git
          cd RABCDAsm
          dmd -run build_rabcdasm.d
          sudo cp abcexport rabcdasm rabcasm abcreplace /usr/local/bin/

      - name: Prepare Android platform
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager"
          fi
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2.3.0
        with:
          air-version: "51.1"
          accept-license: yes

      - name: Inject version into Config.as
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ steps.version.outputs.TAG_VERSION }}\"/" loader/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ steps.version.outputs.APP_VERSION }}</versionNumber>|" loader/app.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ steps.version.outputs.TAG_VERSION }}</versionLabel>|" loader/app.xml

      - name: Build AAB
        run: ./scripts/build-apk.sh --target-aab

      - name: Build universal APK from AAB
        run: |
          BUNDLETOOL_JAR="bundletool.jar"
          curl -L -o "$BUNDLETOOL_JAR" "https://github.com/google/bundletool/releases/download/1.18.2/bundletool-all-1.18.2.jar"

          java -jar "$BUNDLETOOL_JAR" build-apks \
            --bundle=AQWPocket.aab \
            --output=AQWPocket.apks \
            --mode=universal \
            --ks=temp_keystore.jks \
            --ks-key-alias=tempalias \
            --ks-pass=pass:temppass \
            --key-pass=pass:temppass

          unzip -p AQWPocket.apks universal.apk > AQWPocket-universal-${{ steps.version.outputs.TAG_VERSION }}.apk

      - name: Tag release
        run: |
          git tag -f ${{ steps.version.outputs.TAG_VERSION }}
          git push origin ${{ steps.version.outputs.TAG_VERSION }} --force

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_VERSION }}
          name: ${{ steps.version.outputs.TAG_VERSION }}
          prerelease: false
          files: |
            AQWPocket-universal-${{ steps.version.outputs.TAG_VERSION }}.apk
