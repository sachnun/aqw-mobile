name: Build APK

on:
  workflow_dispatch:
    inputs:
      version_prefix:
        description: "Version prefix (e.g. 1.0, 1.1, 2.0)"
        required: false
        default: "1.0"
      publish_release:
        description: "Create git tag and GitHub release"
        required: false
        default: false
        type: boolean

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
    steps:
      - name: Checkout tags
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version and flags
        id: meta
        run: |
          PREFIX="${{ github.event.inputs.version_prefix }}"
          LATEST_TAG="$(git tag --list "v${PREFIX}.*" | grep -E "^v${PREFIX}\.[0-9]+$" | sort -V | tail -n 1 || true)"

          if [ -n "$LATEST_TAG" ]; then
            PATCH_NUMBER="${LATEST_TAG##*.}"
            NEXT_PATCH="$((PATCH_NUMBER + 1))"
          else
            NEXT_PATCH="0"
          fi

          APP_VERSION="${PREFIX}.${NEXT_PATCH}"
          TAG_VERSION="v${APP_VERSION}"

          if [ "${{ github.event.inputs.publish_release }}" = "true" ]; then
            PUBLISH_RELEASE="true"
          else
            PUBLISH_RELEASE="false"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_release=${PUBLISH_RELEASE}" >> "$GITHUB_OUTPUT"

  build_universal:
    name: Build Universal APK
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      apk_name: ${{ steps.meta.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set output names
        id: meta
        run: |
          APK_NAME="AQWPocket-universal-${{ needs.prepare.outputs.tag_version }}.apk"
          ARTIFACT_NAME="universal-apk-${{ needs.prepare.outputs.tag_version }}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Dlang
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: gdc-12

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore RABCDAsm cache
        id: rabcdasm-cache
        uses: actions/cache@v4
        with:
          path: .cache-tools/rabcdasm/bin
          key: rabcdasm-${{ runner.os }}-gdc12-latest-v1

      - name: Build and cache RABCDAsm
        if: steps.rabcdasm-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git liblzma-dev

          rm -rf RABCDAsm
          git clone --depth 1 https://github.com/CyberShadow/RABCDAsm.git
          cd RABCDAsm
          gdmd -O -inline -version=HAVE_LZMA abcexport.d
          gdmd -O -inline -version=HAVE_LZMA rabcdasm.d
          gdmd -O -inline -version=HAVE_LZMA rabcasm.d
          gdmd -O -inline -version=HAVE_LZMA abcreplace.d
          cd ..

          mkdir -p .cache-tools/rabcdasm/bin
          cp RABCDAsm/abcexport RABCDAsm/rabcdasm RABCDAsm/rabcasm RABCDAsm/abcreplace .cache-tools/rabcdasm/bin/

      - name: Add RABCDAsm to PATH
        run: echo "${GITHUB_WORKSPACE}/.cache-tools/rabcdasm/bin" >> "$GITHUB_PATH"

      - name: Prepare Android platform
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager"
          fi
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2.3.0
        with:
          air-version: "51.1.4.1"
          accept-license: yes

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Missing Android signing secrets."
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"

          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASS=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_PASS=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"

      - name: Inject version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" loader/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" loader/app.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" loader/app.xml

      - name: Build AAB
        run: ./scripts/build-apk.sh --target-aab

      - name: Normalize AAB native library compression
        run: |
          java scripts/BuildTools.java normalize-aab build/AQWPocket.aab build/AQWPocket-normalized.aab

      - name: Restore bundletool cache
        id: bundletool-cache
        uses: actions/cache@v4
        with:
          path: .cache-tools/bundletool/bundletool-all-1.18.2.jar
          key: bundletool-1.18.2

      - name: Download bundletool
        if: steps.bundletool-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache-tools/bundletool
          curl -L -o .cache-tools/bundletool/bundletool-all-1.18.2.jar "https://github.com/google/bundletool/releases/download/1.18.2/bundletool-all-1.18.2.jar"

      - name: Build universal APK from normalized AAB
        run: |
          java -jar .cache-tools/bundletool/bundletool-all-1.18.2.jar build-apks \
            --bundle=build/AQWPocket-normalized.aab \
            --output=build/AQWPocket.apks \
            --mode=universal \
            --ks="$KEYSTORE_PATH" \
            --ks-key-alias="$KEY_ALIAS" \
            --ks-pass=pass:"$KEYSTORE_PASS" \
            --key-pass=pass:"$KEY_PASS"

          unzip -p build/AQWPocket.apks universal.apk > "build/${{ steps.meta.outputs.apk_name }}"
          rm -f build/AQWPocket.apks build/AQWPocket-normalized.aab

      - name: Clean signing keystore
        if: always()
        run: rm -f "$KEYSTORE_PATH"

      - name: Upload universal APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/${{ steps.meta.outputs.apk_name }}
          if-no-files-found: error

  inspect_artifact:
    name: Inspect Artifact
    runs-on: ubuntu-latest
    needs: [prepare, build_universal]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_universal.outputs.artifact_name }}
          path: build

      - name: Print APK size and native library compression
        run: |
          java scripts/BuildTools.java inspect-native-libs "build/${{ needs.build_universal.outputs.apk_name }}"

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build_universal, inspect_artifact]
    if: needs.prepare.outputs.publish_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_universal.outputs.artifact_name }}
          path: build

      - name: Tag release
        run: |
          git tag -f ${{ needs.prepare.outputs.tag_version }}
          git push origin ${{ needs.prepare.outputs.tag_version }} --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_version }}
          name: ${{ needs.prepare.outputs.tag_version }}
          prerelease: false
          generate_release_notes: true
          files: |
            build/${{ needs.build_universal.outputs.apk_name }}
